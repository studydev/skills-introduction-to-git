name: 단계 5

on:
  repository_dispatch:
    types:
      - post-merge

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_6_FILE: ".github/steps/6-step.md"

jobs:
  find_exercise:
    name: 실습 이슈 찾기
    uses: skills-kr/exercise-toolkit/.github/workflows/find-exercise-issue.yml@kr-v0.6.0

  check_step_work:
    name: 단계 작업 확인
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    # Don't check unless at least 10 commits have been made
    if: ${{ github.event.client_payload.branch_commit_count >= 10 }}

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v4
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 마지막 댓글 찾기
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: 댓글 업데이트 - 작업 확인 중
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      # START: Check practical exercise

      - name: 최고 점수 트래커 머지 커밋 확인
        id: check-for-high-score-tracker-merge-commit
        continue-on-error: true
        uses: actions/github-script@v6
        env:
          commit_messages: ${{ toJson(github.event.client_payload.branch_commit_messages) }}
          keyword: "tracker"
        with:
          script: |
            // Load commit messages and keyword
            const commitMessages = JSON.parse(process.env.commit_messages || "[]");
            let keyword = process.env.keyword || "";
            keyword = keyword.toLowerCase();

            // Check commit messages for keyword
            for (const commit of commitMessages) {
              const message = commit.message.toLowerCase();
              if (message.includes(keyword)) {
                return;
              }
            }
            throw new Error(`No commit message contains the keyword '${keyword}'`);

      - name: 레벨 계산 커밋 확인 (FF 머지)
        id: check-calculate-level-commit
        continue-on-error: true
        uses: actions/github-script@v6
        env:
          commit_messages: ${{ toJson(github.event.client_payload.branch_commit_messages) }}
          keyword: "calculate level"
        with:
          script: |
            // Load commit messages and keyword
            const commitMessages = JSON.parse(process.env.commit_messages || "[]");
            let keyword = process.env.keyword || "";
            keyword = keyword.toLowerCase();

            // Check commit messages for keyword
            for (const commit of commitMessages) {
              const message = commit.message.toLowerCase();
              if (message.includes(keyword)) {
                return;
              }
            }
            throw new Error(`No commit message contains the keyword '${keyword}'`);

      - name: 댓글 업데이트 - 단계 결과
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 5
            results_table:
              - description: "최고 점수 브랜치 머지"
                passed: ${{ steps.check-for-high-score-tracker-merge-commit.outcome == 'success' }}
              - description: "레벨 카운터 브랜치 머지"
                passed: ${{ steps.check-calculate-level-commit.outcome == 'success' }}

      # END: Check practical exercise

      - name: 모든 검사가 통과하지 않으면 실패
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: 다음 단계 내용 게시
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v4
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 댓글 작성 - 단계 완료
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 6

      - name: 댓글 작성 - 단계 내용 추가
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_6_FILE }}

      - name: 댓글 작성 - 진행 상황 확인 중
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: 현재 워크플로우 비활성화 및 다음 활성화
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "단계 6"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workshop Tracker에 단계 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "sessionId": "'"$SESSION_ID"'",
              "type": "step",
              "step": 5,
              "description": "브랜치 작업",
              "username": "'"$GITHUB_ACTOR"'",
              "repo": "'"$GITHUB_REPOSITORY"'",
              "track": "'"$TRACK"'",
              "runId": "'"$GITHUB_RUN_ID"'"
            }' || true
