name: 단계 3

on:
  repository_dispatch:
    types:
      - post-checkout

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_4_FILE: ".github/steps/4-step.md"

jobs:
  find_exercise:
    name: 실습 이슈 찾기
    uses: skills-kr/exercise-toolkit/.github/workflows/find-exercise-issue.yml@kr-v0.6.0

  check_step_work:
    name: 단계 작업 확인
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    # Don't check unless branch is main
    if: ${{ github.event.client_payload.branch_name == 'main' }}

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v4
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 마지막 댓글 찾기
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: 댓글 업데이트 - 작업 확인 중
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      # START: Check practical exercise

      - name: 현재 커밋이 최신 커밋인지 확인
        id: check-current-head-location
        continue-on-error: true
        uses: actions/github-script@v6
        env:
          previous_head: ${{ github.event.client_payload.previous_head }}
          new_head: ${{ github.event.client_payload.new_head }}
          branch_name: ${{ github.event.client_payload.branch_name }}
          required_count: 2
        with:
          script: |
            // Load checkout details
            const previous_head = process.env.previous_head || "";
            const new_head = process.env.new_head || "";
            const branch_name = process.env.branch_name || "";

            // Fail the workflow if they have not returned to top of the branch
            console.log(`Previous HEAD: ${previous_head}`);
            console.log(`New HEAD: ${new_head}`);
            console.log(`Branch Name: ${branch_name}`);
            // (check pending)

      - name: 댓글 업데이트 - 단계 결과
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 3
            results_table:
              - description: "과거 커밋을 미리보고 최신 커밋으로 복귀"
                passed: ${{ steps.check-current-head-location.outcome == 'success' }}

      # END: Check practical exercise

      - name: 모든 검사가 통과하지 않으면 실패
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: 다음 단계 내용 게시
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 응답 템플릿 가져오기
        uses: actions/checkout@v4
        with:
          repository: skills-kr/exercise-toolkit
          path: exercise-toolkit
          ref: kr-v0.6.0

      - name: 댓글 작성 - 단계 완료
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 4

      - name: 댓글 작성 - 단계 내용 추가
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_4_FILE }}

      - name: 댓글 작성 - 진행 상황 확인 중
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: 현재 워크플로우 비활성화 및 다음 활성화
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "단계 4"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workshop Tracker에 단계 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "sessionId": "'"$SESSION_ID"'",
              "type": "step",
              "step": 3,
              "description": "히스토리 탐색",
              "username": "'"$GITHUB_ACTOR"'",
              "repo": "'"$GITHUB_REPOSITORY"'",
              "track": "'"$TRACK"'",
              "runId": "'"$GITHUB_RUN_ID"'"
            }' || true
